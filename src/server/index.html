<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antfarm Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono&display=swap" rel="stylesheet">
<style>
/* ── Theme tokens ──────────────────────────────────────────────── */
:root {
  --bg-page: #FAF8F5;
  --bg-surface: #fff;
  --bg-surface-alt: #FAF8F5;
  --bg-column-header: #f5f0e8;
  --text-primary: #3A3226;
  --text-secondary: #8b8072;
  --text-tertiary: #5a5045;
  --border: #D4C4A0;
  --border-light: #eee;
  --shadow: rgba(58, 50, 38, .1);
  --shadow-heavy: rgba(58, 50, 38, .15);
  --overlay: rgba(58, 50, 38, .5);

  /* Header */
  --header-bg: #6B7F3B;
  --header-border: #5a6b32;
  --header-select-bg: #5a6b32;
  --header-select-border: #4a5a28;

  /* Accents — shared across themes */
  --accent-green: #6B7F3B;
  --accent-green-subtle: #6B7F3B22;
  --accent-teal: #3a9e8a;
  --accent-teal-subtle: #8ECFC033;
  --accent-orange: #E8845C;
  --accent-orange-subtle: #E8845C22;
  --accent-muted: #D4C4A044;
  --accent-orange-faint: #E8845C11;
  --accent-highlight: #D4E8A0;

  /* Pre/code */
  --bg-code: #FAF8F5;

  /* Loop groups */
  --loop-border: var(--accent-teal);
}

[data-theme="dark"] {
  --bg-page: #1a1917;
  --bg-surface: #262521;
  --bg-surface-alt: #1f1e1b;
  --bg-column-header: #2a2926;
  --text-primary: #e0d8ce;
  --text-secondary: #9a9088;
  --text-tertiary: #b0a89e;
  --border: #3d3a34;
  --border-light: #333;
  --shadow: rgba(0, 0, 0, .25);
  --shadow-heavy: rgba(0, 0, 0, .4);
  --overlay: rgba(0, 0, 0, .6);

  --header-bg: #2d3320;
  --header-border: #3a4228;
  --header-select-bg: #3a4228;
  --header-select-border: #4a5438;

  --accent-green: #8fa74e;
  --accent-green-subtle: rgba(143, 167, 78, .15);
  --accent-teal: #6bc4b0;
  --accent-teal-subtle: rgba(107, 196, 176, .15);
  --accent-orange: #e8955f;
  --accent-orange-subtle: rgba(232, 149, 95, .15);
  --accent-muted: rgba(255, 255, 255, .06);
  --accent-orange-faint: rgba(232, 149, 95, .08);
  --accent-highlight: #b5cc80;

  --bg-code: #1f1e1b;
}

/* ── Auto dark mode when no explicit preference ───────────────── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg-page: #1a1917;
    --bg-surface: #262521;
    --bg-surface-alt: #1f1e1b;
    --bg-column-header: #2a2926;
    --text-primary: #e0d8ce;
    --text-secondary: #9a9088;
    --text-tertiary: #b0a89e;
    --border: #3d3a34;
    --border-light: #333;
    --shadow: rgba(0, 0, 0, .25);
    --shadow-heavy: rgba(0, 0, 0, .4);
    --overlay: rgba(0, 0, 0, .6);

    --header-bg: #2d3320;
    --header-border: #3a4228;
    --header-select-bg: #3a4228;
    --header-select-border: #4a5438;

    --accent-green: #8fa74e;
    --accent-green-subtle: rgba(143, 167, 78, .15);
    --accent-teal: #6bc4b0;
    --accent-teal-subtle: rgba(107, 196, 176, .15);
    --accent-orange: #e8955f;
    --accent-orange-subtle: rgba(232, 149, 95, .15);
    --accent-muted: rgba(255, 255, 255, .06);
    --accent-orange-faint: rgba(232, 149, 95, .08);
    --accent-highlight: #b5cc80;

    --bg-code: #1f1e1b;
  }
}

/* ── Base ──────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh}
header{background:var(--header-bg);border-bottom:2px solid var(--header-border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header img{height:36px;border-radius:6px}
header h1{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:0}
header h1 span{color:var(--accent-highlight)}
select{background:var(--header-select-bg);color:#fff;border:1px solid var(--header-select-border);border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer}
select option{background:var(--header-select-bg);color:#fff}
select:focus{outline:none;border-color:#8ECFC0}

/* ── Theme toggle ─────────────────────────────────────────────── */
.theme-toggle{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;cursor:pointer;padding:5px 8px;font-size:16px;line-height:1;transition:border-color .15s}
.theme-toggle:hover{border-color:rgba(255,255,255,.5)}

/* ── Board ─────────────────────────────────────────────────────── */
.board{display:flex;gap:16px;padding:24px;overflow-x:auto;min-height:calc(100vh - 65px)}
.column{min-width:240px;flex:1;background:var(--bg-surface);border:none;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 2px 8px var(--shadow)}
.column-header{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-green);background:var(--bg-column-header);border-radius:8px 8px 0 0}
.column-header .count{background:var(--accent-green);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;margin-left:8px}
.cards{padding:8px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}

/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--accent-orange);box-shadow:0 2px 8px var(--accent-orange-subtle)}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:11px;color:var(--text-secondary);display:flex;justify-content:space-between;align-items:center}
.card.done{border-left:3px solid var(--accent-green)}
.card.failed,.card.error{border-left:3px solid var(--accent-orange)}
.card-cancel-btn{background:none;border:1px solid var(--accent-orange);border-radius:4px;color:var(--accent-orange);cursor:pointer;font-size:10px;font-weight:600;padding:2px 6px;line-height:1.4;flex-shrink:0;transition:background .15s,color .15s}
.card-cancel-btn:hover{background:var(--accent-orange);color:#fff}

/* ── Overlay / Panel ───────────────────────────────────────────── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.overlay.open{opacity:1;pointer-events:auto}
.panel{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 8px 32px var(--shadow-heavy)}
.panel-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.panel-close:hover{color:var(--text-primary);background:var(--bg-column-header)}
.panel h2{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:4px;padding-right:40px}
.panel-task{font-size:13px;color:var(--text-secondary);margin-bottom:16px;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto;line-height:1.5}
.panel-meta{display:flex;gap:12px;margin-bottom:20px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap}
.panel-meta span{display:flex;align-items:center;gap:4px}

/* ── Steps ─────────────────────────────────────────────────────── */
.steps-list{display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.step-icon.done{background:var(--accent-green-subtle);color:var(--accent-green)}
.step-icon.running{background:var(--accent-teal-subtle);color:var(--accent-teal)}
.step-icon.pending{background:var(--accent-muted);color:var(--text-secondary)}
.step-icon.waiting{background:var(--accent-muted);color:var(--text-secondary)}
.step-icon.failed,.step-icon.error{background:var(--accent-orange-subtle);color:var(--accent-orange)}
.step-name{font-size:13px;font-weight:500;color:var(--text-primary);flex:1}
.step-agent{font-size:11px;color:var(--text-secondary);font-family:'Geist Mono',monospace}
.step-status{font-size:11px;text-transform:uppercase;font-weight:600}

/* ── Loop Groups ───────────────────────────────────────────────── */
.loop-group{position:relative;border:2px solid var(--accent-teal);border-radius:8px;padding:10px 10px 10px 10px;margin-bottom:0;background:var(--accent-teal-subtle)}
.loop-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-teal);margin-bottom:6px;padding-left:4px;display:flex;align-items:center;gap:6px}
.loop-group-label::before{content:'↻';font-size:13px;font-weight:400}
.loop-group-steps{display:flex;flex-direction:column;gap:6px;padding-left:12px}
.loop-badge-wrapper{display:flex;justify-content:flex-start;align-items:center;padding-left:8px;margin:-2px 0}
.loop-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-surface,#fff);border:2px solid var(--accent-teal);position:relative;overflow:hidden;flex-shrink:0}
.loop-badge svg{width:28px;height:28px}
.loop-badge-text{position:absolute;font-size:8px;font-weight:700;color:var(--accent-teal);z-index:1;line-height:1}

/* ── Badges ────────────────────────────────────────────────────── */
.badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.badge-running{background:var(--accent-teal-subtle);color:var(--accent-teal)}
.badge-done,.badge-completed{background:var(--accent-green-subtle);color:var(--accent-green)}
.badge-failed,.badge-error{background:var(--accent-orange-subtle);color:var(--accent-orange)}
.badge-waiting{background:var(--accent-muted);color:var(--text-secondary)}
.badge-pending{background:var(--accent-muted);color:var(--text-secondary)}
.badge-blocked{background:var(--accent-orange-faint);color:var(--accent-orange)}

/* ── Backlog column ─────────────────────────────────────────────── */
.backlog-card{background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px;padding:12px}
.backlog-card.dispatched{opacity:.6}
.backlog-card-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.backlog-card-meta{font-size:11px;color:var(--text-secondary);display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.backlog-dispatch-btn{background:var(--accent-green);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s}
.backlog-dispatch-btn:hover{opacity:.85}
.backlog-dispatch-btn:disabled{opacity:.5;cursor:not-allowed}
.backlog-dispatch-btn--blocked{background:var(--accent-orange);cursor:not-allowed}
.backlog-delete-btn{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px;line-height:1}
.backlog-delete-btn:hover{color:var(--accent-orange);background:var(--accent-orange-subtle)}

/* ── Status filter buttons ─────────────────────────────────────── */
.status-filter-bar{display:flex;align-items:center;gap:6px}
.status-filter-btn{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:rgba(255,255,255,.7);cursor:pointer;padding:4px 10px;font-size:12px;font-weight:500;line-height:1.4;transition:border-color .15s,color .15s}
.status-filter-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.status-filter-btn.active{border-color:var(--accent-green);color:#fff;background:rgba(107,127,59,.35)}

/* ── Misc ──────────────────────────────────────────────────────── */
.empty{color:var(--text-secondary);font-size:12px;text-align:center;padding:24px 8px}
.refresh-note{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}
@media(max-width:768px){.board{flex-direction:column}.column{min-width:unset}}
.story-open{display:block!important}
.story-chevron-open{transform:rotate(90deg)}
.step-open{display:block!important}
.step-chevron-open{transform:rotate(90deg)}

/* ── Medic indicator ───────────────────────────────────────────── */
.medic-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.85);cursor:pointer;padding:4px 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;transition:border-color .15s,background .15s}
.medic-badge:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
.medic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.medic-dot.healthy{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5);animation:pulse 2s infinite}
.medic-dot.warning{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.5)}
.medic-dot.critical{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,.5);animation:pulse 1s infinite}
.medic-dot.unknown{background:#9ca3af}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.medic-panel{position:fixed;top:60px;right:16px;width:340px;max-height:500px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px var(--shadow-heavy);z-index:50;overflow:hidden;display:none;flex-direction:column}
.medic-panel.open{display:flex}
.medic-panel-header{padding:14px 16px;border-bottom:1px solid var(--border-light);font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.medic-panel-body{padding:12px 16px;overflow-y:auto;flex:1}
.medic-stat{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border-light)}
.medic-stat:last-child{border-bottom:none}
.medic-stat-value{font-weight:600;color:var(--text-primary)}
.medic-check-row{padding:8px 0;border-bottom:1px solid var(--border-light);font-size:11px;line-height:1.5}
.medic-check-row:last-child{border-bottom:none}
.medic-check-time{color:var(--text-secondary);font-family:'Geist Mono',monospace}
.medic-check-summary{color:var(--text-primary);margin-left:8px}

/* ── Projects column ─────────────────────────────────────────────── */
.project-card{background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px;padding:10px 12px;position:relative}
.project-card-name{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:4px;padding-right:22px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-card-meta{font-size:11px;color:var(--text-secondary);display:flex;flex-direction:column;gap:2px}
.project-card-path{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-card-link{color:var(--accent-teal);text-decoration:none}
.project-card-link:hover{text-decoration:underline}
.project-delete-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px;line-height:1}
.project-detail{margin-top:6px;font-size:11px}
.project-detail-summary{cursor:pointer;color:var(--text-secondary);user-select:none;list-style:none;display:flex;align-items:center;gap:4px}
.project-detail-summary::-webkit-details-marker{display:none}
.project-detail-item{padding:2px 0;color:var(--text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-detail-empty{color:var(--text-secondary);font-style:italic}
.project-delete-btn:hover{color:var(--accent-orange);background:var(--accent-orange-subtle)}
.project-add-form{display:none;flex-direction:column;gap:6px;padding:8px}
.project-add-form.open{display:flex}
.project-add-form input{background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:12px;padding:5px 8px;width:100%}
.project-add-form input:focus{outline:none;border-color:var(--accent-teal)}
.project-add-form input::placeholder{color:var(--text-secondary)}
.project-form-btns{display:flex;gap:6px}
.project-form-submit{background:var(--accent-green);color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer}
.project-form-submit:hover{opacity:.85}
.backlog-add-btn{background:var(--accent-green);color:#fff;border:none;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s;flex-shrink:0}
.backlog-add-btn:hover{opacity:.85}
.backlog-modal-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.backlog-modal-field label{font-size:12px;font-weight:600;color:var(--text-secondary)}
.backlog-modal-field input,.backlog-modal-field textarea{background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;padding:7px 10px;font-family:inherit;resize:vertical;outline:none;transition:border-color .15s}
.backlog-modal-field input:focus,.backlog-modal-field textarea:focus{border-color:var(--accent-green)}
.backlog-modal-actions{display:flex;flex-direction:row;gap:8px;margin-top:4px}
.backlog-modal-save-btn{background:var(--accent-green);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.backlog-modal-save-btn:hover{opacity:.85}
.backlog-modal-cancel-btn{background:var(--bg-column-header);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.backlog-modal-cancel-btn:hover{background:var(--border)}
.project-form-cancel{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:11px;color:var(--text-secondary);cursor:pointer}
.project-add-btn{display:block;background:none;border:1px dashed var(--border);border-radius:4px;color:var(--text-secondary);cursor:pointer;font-size:11px;padding:5px;margin:4px 8px 8px;width:calc(100% - 16px);text-align:center;transition:border-color .15s,color .15s}
.project-add-btn:hover{border-color:var(--accent-green);color:var(--accent-green)}
</style>
</head>
<body>
<header>
  <h1><span>antfarm</span> dashboard</h1>
  <select id="wf-select"><option value="">Loading...</option></select>
  <div class="status-filter-bar">
    <button class="status-filter-btn" data-status="running">running</button>
    <button class="status-filter-btn" data-status="done">done</button>
    <button class="status-filter-btn" data-status="failed">failed</button>
    <button class="status-filter-btn" data-status="cancelled">cancelled</button>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">☀️</button>
  <div class="medic-badge" id="medic-badge" onclick="toggleMedicPanel()" title="Medic watchdog status">
    <span class="medic-dot unknown" id="medic-dot"></span>
    <span id="medic-label">Medic</span>
  </div>
  <span class="refresh-note" id="refresh-note">Auto-refresh: 30s</span>
</header>
<div class="board" id="board"><div class="empty" style="margin:auto">Select a workflow</div></div>
<div class="medic-panel" id="medic-panel">
  <div class="medic-panel-header">Workflow Medic</div>
  <div class="medic-panel-body" id="medic-panel-body">Loading...</div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panel"></div>
</div>
<div class="overlay" id="backlog-modal-overlay" style="display:none" onclick="if(event.target===this)closeBacklogModal()">
  <div class="panel" id="backlog-modal">
    <button class="panel-close" onclick="closeBacklogModal()">✕</button>
    <h2 id="backlog-modal-title-heading">New Backlog Entry</h2>
    <form id="backlog-modal-form" onsubmit="return false">
      <div class="backlog-modal-field">
        <label for="bm-title">Title <span style="color:var(--accent-orange)">*</span></label>
        <input type="text" id="bm-title" required placeholder="Entry title">
      </div>
      <div class="backlog-modal-field">
        <label for="bm-description">Description</label>
        <textarea id="bm-description" rows="4" placeholder="Describe the backlog entry"></textarea>
      </div>
      <div class="backlog-modal-field">
        <label for="bm-criteria">Acceptance Criteria</label>
        <textarea id="bm-criteria" rows="4" placeholder="- Criterion 1&#10;- Criterion 2"></textarea>
      </div>
      <div class="backlog-modal-field">
        <label for="bm-notes">Notes</label>
        <textarea id="bm-notes" rows="3" placeholder="Additional notes"></textarea>
      </div>
      <div class="backlog-modal-field">
        <label for="bm-tags">Tags (comma-separated)</label>
        <input type="text" id="bm-tags" placeholder="tag1, tag2, tag3">
      </div>
      <div class="backlog-modal-field">
        <label for="bm-priority">Priority (0–10)</label>
        <input type="number" id="bm-priority" min="0" max="10" placeholder="5">
      </div>
      <div class="backlog-modal-actions">
        <button type="submit" class="backlog-modal-save-btn">Save</button>
        <button type="button" class="backlog-modal-cancel-btn" onclick="closeBacklogModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = '';
let workflows = [];
let currentWf = null;
let openRunId = null;
let openRunRefreshInterval = null;
let backlogEntries = [];
let editingBacklogId = null;
let projects = [];
let allRuns = [];

// ── Status filters ───────────────────────────────────────────────
const STATUS_FILTER_KEY = 'antfarm-status-filter';
const STATUS_FILTER_DEFAULT = ['running'];
let activeStatuses = loadStatusFilters();

function loadStatusFilters() {
  try {
    const stored = localStorage.getItem(STATUS_FILTER_KEY);
    if (stored) return JSON.parse(stored);
  } catch { /* ignore */ }
  return STATUS_FILTER_DEFAULT.slice();
}

function saveStatusFilters() {
  localStorage.setItem(STATUS_FILTER_KEY, JSON.stringify(activeStatuses));
}

function initStatusFilterButtons() {
  document.querySelectorAll('.status-filter-btn').forEach(btn => {
    const status = btn.getAttribute('data-status');
    if (activeStatuses.includes(status)) btn.classList.add('active');
    btn.addEventListener('click', () => {
      if (activeStatuses.includes(status)) {
        activeStatuses = activeStatuses.filter(s => s !== status);
        btn.classList.remove('active');
      } else {
        activeStatuses = [...activeStatuses, status];
        btn.classList.add('active');
      }
      saveStatusFilters();
      if (currentWf) loadRuns();
    });
  });
}

function clearOpenRunRefresh() {
  if (openRunRefreshInterval) {
    clearInterval(openRunRefreshInterval);
    openRunRefreshInterval = null;
  }
}

function startOpenRunRefresh() {
  if (!openRunId) return;
  clearOpenRunRefresh();
  openRunRefreshInterval = setInterval(() => {
    void refreshOpenRunPanel();
  }, 5000);
}

async function fetchJSON(url) {
  const r = await fetch(API + url);
  return r.json();
}

async function loadWorkflows() {
  workflows = await fetchJSON('/api/workflows');
  const sel = document.getElementById('wf-select');
  sel.innerHTML = '<option value="">— select workflow —</option>' +
    workflows.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
  if (workflows.length === 1) {
    sel.value = workflows[0].id;
    selectWorkflow(workflows[0].id);
  } else if (workflows.length > 1) {
    // Auto-select workflow with active runs
    try {
      for (const w of workflows) {
        const runs = await fetchJSON(`/api/runs?workflow=${w.id}`);
        const active = runs.find(r => r.status === 'running' || r.status === 'pending');
        if (active) { sel.value = w.id; selectWorkflow(w.id); break; }
      }
    } catch {}
  }
}

function selectWorkflow(id) {
  currentWf = workflows.find(w => w.id === id) || null;
  if (currentWf) loadRuns();
  else document.getElementById('board').innerHTML = renderProjectsColumn() + '<div class="empty" style="margin:auto">Select a workflow</div>';
}

async function loadBacklog() {
  try {
    const qs = currentWf ? `?workflow=${encodeURIComponent(currentWf.id)}` : '';
    backlogEntries = await fetchJSON(`/api/backlog${qs}`);
  } catch {
    backlogEntries = [];
  }
}

async function loadProjects() {
  try {
    projects = await fetchJSON('/api/projects');
  } catch {
    projects = [];
  }
}

function renderProjectsColumn() {
  const cardHTML = projects.length === 0
    ? '<div class="empty">No projects</div>'
    : projects.map(p => {
        const pathLine = p.git_repo_path
          ? `<div class="project-card-path" title="${esc(p.git_repo_path)}">${esc(p.git_repo_path)}</div>`
          : '';
        const urlLine = p.github_repo_url
          ? `<div><a class="project-card-link" href="${esc(p.github_repo_url)}" target="_blank" rel="noopener">${esc(p.github_repo_url)}</a></div>`
          : '';
        return `<div class="project-card">
          <button class="project-delete-btn" onclick="deleteProject('${esc(p.id)}')" title="Delete project">✕</button>
          <div class="project-card-name" title="${esc(p.name)}">${esc(p.name)}</div>
          <div class="project-card-meta">${pathLine}${urlLine}</div>
          <details class="project-detail" data-project-id="${esc(p.id)}" ontoggle="loadProjectDetail(this)">
            <summary class="project-detail-summary">backlog &amp; runs</summary>
            <div class="project-detail-body"><span class="project-detail-empty">Loading...</span></div>
          </details>
        </div>`;
      }).join('');
  return `<div class="column" id="projects-column">
    <div class="column-header">Projects<span class="count">${projects.length}</span></div>
    <div class="cards">${cardHTML}</div>
    <div class="project-add-form" id="project-add-form">
      <input id="project-name-input" type="text" placeholder="Name (required)" autocomplete="off">
      <input id="project-git-input" type="text" placeholder="Git repo path (optional)" autocomplete="off">
      <input id="project-url-input" type="text" placeholder="GitHub repo URL (optional)" autocomplete="off">
      <div class="project-form-btns">
        <button class="project-form-submit" onclick="submitAddProject()">Add</button>
        <button class="project-form-cancel" onclick="cancelAddProject()">Cancel</button>
      </div>
    </div>
    <button class="project-add-btn" id="project-add-btn" onclick="showAddProjectForm()">+ Add Project</button>
  </div>`;
}

function showAddProjectForm() {
  const form = document.getElementById('project-add-form');
  const btn = document.getElementById('project-add-btn');
  if (form) form.classList.add('open');
  if (btn) btn.style.display = 'none';
  const inp = document.getElementById('project-name-input');
  if (inp) inp.focus();
}

function cancelAddProject() {
  const form = document.getElementById('project-add-form');
  const btn = document.getElementById('project-add-btn');
  if (form) { form.classList.remove('open'); clearProjectForm(); }
  if (btn) btn.style.display = '';
}

function clearProjectForm() {
  ['project-name-input','project-git-input','project-url-input'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

async function submitAddProject() {
  const nameEl = document.getElementById('project-name-input');
  const gitEl = document.getElementById('project-git-input');
  const urlEl = document.getElementById('project-url-input');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { if (nameEl) nameEl.focus(); return; }
  const body = { name: name };
  const gitPath = gitEl ? gitEl.value.trim() : '';
  const ghUrl = urlEl ? urlEl.value.trim() : '';
  if (gitPath) body.gitRepoPath = gitPath;
  if (ghUrl) body.githubRepoUrl = ghUrl;
  try {
    const r = await fetch(API + '/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) return;
    await loadProjects();
    rerenderProjectsColumn();
  } catch { /* ignore */ }
}

async function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  try {
    await fetch(API + '/api/projects/' + encodeURIComponent(id), { method: 'DELETE' });
    await loadProjects();
    rerenderProjectsColumn();
  } catch { /* ignore */ }
}

function rerenderProjectsColumn() {
  const col = document.getElementById('projects-column');
  if (!col) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderProjectsColumn();
  const newCol = tmp.firstElementChild;
  if (newCol) col.replaceWith(newCol);
}

async function loadProjectDetail(detailsEl) {
  if (!detailsEl.open) return;
  if (detailsEl.dataset.loaded) return;
  detailsEl.dataset.loaded = '1';
  const id = detailsEl.dataset.projectId;
  const body = detailsEl.querySelector('.project-detail-body');
  try {
    const [backlog, runs] = await Promise.all([
      fetchJSON('/api/projects/' + encodeURIComponent(id) + '/backlog'),
      fetchJSON('/api/projects/' + encodeURIComponent(id) + '/runs'),
    ]);
    let html = '';
    html += '<div style="font-weight:500;color:var(--text-secondary);margin-top:4px">Backlog</div>';
    if (backlog.length === 0) {
      html += '<div class="project-detail-empty">No backlog entries</div>';
    } else {
      for (const e of backlog) {
        html += `<div class="project-detail-item" title="${esc(e.title)}">[${esc(e.status)}] ${esc(e.title)}</div>`;
      }
    }
    html += '<div style="font-weight:500;color:var(--text-secondary);margin-top:6px">Runs</div>';
    if (runs.length === 0) {
      html += '<div class="project-detail-empty">No runs</div>';
    } else {
      for (const r of runs) {
        const num = r.run_number != null ? '#' + r.run_number : r.id.slice(0, 8);
        html += `<div class="project-detail-item" title="${esc(r.task)}">${esc(num)} [${esc(r.status)}] ${esc(r.task.slice(0, 50))}</div>`;
      }
    }
    if (body) body.innerHTML = html;
  } catch {
    if (body) body.innerHTML = '<span class="project-detail-empty">Failed to load</span>';
  }
}

async function loadRuns() {
  if (!currentWf) return;
  const [runs] = await Promise.all([
    fetchJSON(`/api/runs?workflow=${currentWf.id}`),
    loadBacklog(),
    loadProjects(),
  ]);
  allRuns = runs;
  renderBoard(currentWf, runs);
}

function getActiveStepId(run) {
  if (!run.steps || !run.steps.length) return null;
  const active = run.steps.find(s => s.status !== 'done' && s.status !== 'skipped');
  return active ? active.step_id : run.steps[run.steps.length - 1].step_id;
}

function renderBacklogColumn() {
  const entries = backlogEntries;
  const cardHTML = entries.length === 0
    ? '<div class="empty">No backlog entries</div>'
    : entries.map(entry => {
        const isDispatched = entry.status === 'dispatched';
        const hasActiveRun = entry.project_id
          ? allRuns.some(r => r.project_id === entry.project_id && r.status === 'running')
          : false;
        const cls = isDispatched ? 'dispatched' : '';
        const priorityBadge = entry.priority > 0
          ? `<span class="badge badge-pending" title="Priority">P${entry.priority}</span>`
          : '';
        const checkIcon = isDispatched ? '✓ ' : '';
        const btnLabel = isDispatched ? 'Dispatched ✓' : 'Dispatch';
        const dispatchDisabled = isDispatched || hasActiveRun ? 'disabled' : '';
        const dispatchClass = hasActiveRun ? 'backlog-dispatch-btn backlog-dispatch-btn--blocked' : 'backlog-dispatch-btn';
        const dispatchTitle = hasActiveRun ? 'title="Project run already in flight"' : '';
        return `<div class="backlog-card ${cls}" data-backlog-id="${entry.id}" data-backlog-title="${esc(entry.title)}">
          <div class="backlog-card-title" title="${esc(entry.title)}">${checkIcon}${esc(entry.title)}</div>
          <div class="backlog-card-error" style="display:none;color:var(--status-failed,#e05);font-size:11px;margin-top:4px"></div>
          <div class="backlog-card-meta">
            <span style="display:flex;gap:4px;align-items:center">
              <span class="badge badge-${entry.status} backlog-status-badge">${entry.status}</span>
              ${priorityBadge}
            </span>
            <button class="${dispatchClass}" onclick="dispatchBacklogEntry('${entry.id}',this)" ${dispatchDisabled} ${dispatchTitle}>${btnLabel}</button>
            <button class="backlog-delete-btn" onclick="deleteBacklogEntry('${entry.id}',this)" title="Delete">✕</button>
          </div>
        </div>`;
      }).join('');
  return `<div class="column" id="backlog-column">
    <div class="column-header" style="display:flex;justify-content:space-between;align-items:center">
      <span>Backlog<span class="count">${entries.length}</span></span>
      <button class="backlog-add-btn" onclick="openBacklogForm()">+ Add</button>
    </div>
    <div class="cards">${cardHTML}</div>
  </div>`;
}

function openBacklogForm() {
  editingBacklogId = null;
  const overlay = document.getElementById('backlog-modal-overlay');
  const heading = document.getElementById('backlog-modal-title-heading');
  document.getElementById('bm-title').value = '';
  document.getElementById('bm-description').value = '';
  document.getElementById('bm-criteria').value = '';
  document.getElementById('bm-notes').value = '';
  document.getElementById('bm-tags').value = '';
  document.getElementById('bm-priority').value = '';
  heading.textContent = 'New Backlog Entry';
  overlay.style.display = 'flex';
  overlay.classList.add('open');
  document.getElementById('bm-title').focus();
}

function closeBacklogModal() {
  editingBacklogId = null;
  const overlay = document.getElementById('backlog-modal-overlay');
  overlay.classList.remove('open');
  overlay.style.display = 'none';
  const form = document.getElementById('backlog-modal-form');
  if (form) form.reset();
}

async function dispatchBacklogEntry(id, btn) {
  const card = btn.closest('[data-backlog-id]');
  const title = card ? (card.getAttribute('data-backlog-title') || id) : id;
  if (!confirm(`Dispatch "${title}" to the agent?`)) return;
  const errEl = card ? card.querySelector('.backlog-card-error') : null;
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
  btn.disabled = true;
  btn.textContent = 'Dispatching...';
  try {
    const body = JSON.stringify({ workflowId: currentWf?.id });
    const r = await fetch(API + `/api/backlog/${id}/dispatch`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
    const data = await r.json();
    if (r.ok && data.ok) {
      // Update card in-place: status badge + button
      btn.textContent = 'Dispatched ✓';
      btn.disabled = true;
      if (card) {
        card.classList.add('dispatched');
        const badge = card.querySelector('.backlog-status-badge');
        if (badge) { badge.textContent = 'dispatched'; badge.className = 'badge badge-dispatched backlog-status-badge'; }
        const titleEl = card.querySelector('.backlog-card-title');
        if (titleEl && !titleEl.textContent.startsWith('✓ ')) titleEl.textContent = '✓ ' + titleEl.textContent;
      }
      // Also refresh global state for next render
      await loadBacklog();
    } else if (r.status === 409) {
      btn.disabled = false;
      btn.textContent = 'Dispatch';
      const msg = data.error || 'Project run already in flight';
      if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
    } else {
      btn.disabled = false;
      btn.textContent = 'Dispatch';
      const msg = 'Dispatch failed: ' + (data.error || 'unknown error');
      if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Dispatch';
    const msg = 'Dispatch failed: ' + (e instanceof Error ? e.message : String(e));
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  }
}

async function retryStep(runId, stepId) {
  try {
    await fetch(`${API}/api/runs/${runId}/steps/${stepId}/retry`, { method: 'POST' });
    await refreshOpenRunPanel();
  } catch { /* ignore */ }
}

async function retryStory(runId, storyId) {
  try {
    await fetch(`${API}/api/runs/${runId}/stories/${storyId}/retry`, { method: 'POST' });
    await refreshOpenRunPanel();
  } catch { /* ignore */ }
}

async function cancelRun(id, event) {
  event.stopPropagation();
  if (!confirm('Cancel this run?')) return;
  try {
    const r = await fetch(API + `/api/runs/${id}/cancel`, { method: 'POST' });
    const data = await r.json();
    if (r.ok && data.ok) {
      await loadRuns();
    } else {
      alert('Cancel failed: ' + (data.error || 'unknown error'));
    }
  } catch (e) {
    alert('Cancel failed: ' + (e instanceof Error ? e.message : String(e)));
  }
}

async function deleteBacklogEntry(id, btn) {
  if (!confirm('Delete this backlog item?')) return;
  try {
    const r = await fetch(API + '/api/backlog/' + id, { method: 'DELETE' });
    const data = await r.json();
    if (r.ok && data.ok) {
      const card = btn.closest('[data-backlog-id]');
      if (card) card.remove();
      await loadBacklog();
    }
  } catch { /* ignore */ }
}

function renderBoard(wf, runs) {
  const board = document.getElementById('board');
  const columns = {};
  wf.steps.forEach(s => { columns[s.id] = []; });

  // Filter runs by active status filters (client-side)
  const filteredRuns = runs.filter(run => activeStatuses.includes(run.status));

  filteredRuns.forEach(run => {
    const stepId = getActiveStepId(run);
    const col = stepId && columns[stepId] !== undefined ? stepId : wf.steps[wf.steps.length - 1]?.id;
    if (col && columns[col]) columns[col].push(run);
  });

  const workflowColumnsHTML = wf.steps.map(step => {
    const cards = columns[step.id];
    const cardHTML = cards.length === 0
      ? '<div class="empty">No runs</div>'
      : cards.map(run => {
          const isDone = run.status === 'done';
          const isFailed = run.status === 'failed' || run.status === 'error';
          const isRunning = run.status === 'running';
          const cls = isDone ? 'done' : isFailed ? 'failed' : '';
          const badge = `badge-${run.status}`;
          const time = run.updated_at ? parseTS(run.updated_at)?.toLocaleString() || "" : '';
          const title = run.task.length > 60 ? run.task.slice(0, 57) + '…' : run.task;
          const cancelBtn = isRunning ? `<button class="card-cancel-btn" onclick="cancelRun('${run.id}',event)" title="Cancel this run">Cancel</button>` : '';
          return `<div class="card ${cls}" onclick="openRun('${run.id}')">
            <div class="card-title" title="${run.task.replace(/"/g, '&quot;')}">${title}</div>
            <div class="card-meta">
              <span class="badge ${badge}">${run.status}</span>
              <span>${time}</span>
              ${cancelBtn}
            </div>
          </div>`;
        }).join('');
    return `<div class="column">
      <div class="column-header">${step.id}<span class="count">${cards.length}</span></div>
      <div class="cards">${cardHTML}</div>
    </div>`;
  }).join('');

  board.innerHTML = renderProjectsColumn() + renderBacklogColumn() + workflowColumnsHTML;
}

const stepIcons = {done:'✓',running:'●',pending:'○',waiting:'◌',failed:'✗',error:'✗'};
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Normalize SQLite datetime('now') format (no T/Z) to proper ISO 8601 UTC
function parseTS(ts) { if (!ts) return null; if (!ts.endsWith('Z') && !ts.includes('+')) ts = ts.replace(' ', 'T') + 'Z'; return new Date(ts); }

async function openRun(id) {
  const run = await fetchJSON(`/api/runs/${id}`);
  const stories = await fetchJSON(`/api/runs/${id}/stories`).catch(() => []);
  renderRunPanel(run, stories || []);
  await Promise.all([loadStories(id), loadActivity(id)]);
  openRunId = id;
  document.getElementById('overlay').classList.add('open');
  startOpenRunRefresh();
}

async function refreshOpenRunPanel() {
  if (!openRunId) return;
  try {
    const run = await fetchJSON(`/api/runs/${openRunId}`);
    const stories = await fetchJSON(`/api/runs/${openRunId}/stories`).catch(() => []);
    renderRunPanel(run, stories || []);
    await Promise.all([loadStories(openRunId), loadActivity(openRunId)]);
  } catch {
    closePanel();
  }
}

function renderLoopBadge(stories) {
  const list = stories || [];
  const total = list.length;
  if (total === 0) {
    return `<div class="loop-badge-wrapper"><div class="loop-badge" title="Loop progress"><div class="loop-badge-text">0%</div></div></div>`;
  }
  const done = list.filter(s => s.status === 'done').length;
  const pct = Math.round((done / total) * 100);
  return `<div class="loop-badge-wrapper"><div class="loop-badge" style="background:conic-gradient(var(--accent-teal) 0% ${pct}%,var(--accent-muted) ${pct}% 100%)" title="Loop progress: ${done}/${total}"><div class="loop-badge-text">${done}/${total}</div></div></div>`;
}
function renderRunPanel(run, stories) {
  stories = stories || [];
  const panel = document.getElementById('panel');
  const created = run.created_at ? parseTS(run.created_at)?.toLocaleString() || "" : '';
  const updated = run.updated_at ? parseTS(run.updated_at)?.toLocaleString() || "" : '';
  // Build a map from step UUID to loop group index for quick lookup
  const loopGroups = run.loopGroups || [];
  const stepToGroupIdx = new Map();
  // Build a set of verify step IDs so we can inject the badge before them
  const verifyStepIds = new Set();
  loopGroups.forEach((g, idx) => {
    (g.stepIds || []).forEach(sid => stepToGroupIdx.set(sid, idx));
    if (g.verifyStepId) verifyStepIds.add(g.verifyStepId);
  });
  function renderStepRow(s) {
    const st = s.status || 'waiting';
    const icon = stepIcons[st] || '○';
    const hasOutput = !!s.output;
    const toggleAttr = hasOutput ? `onclick="this.querySelector('.step-details').classList.toggle('step-open');this.querySelector('.step-chevron').classList.toggle('step-chevron-open')" style="cursor:pointer"` : '';
    return `<div class="step-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden" ${toggleAttr}>
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px">
        <div class="step-icon ${st}">${icon}</div>
        <div class="step-name" style="flex:1">${s.step_id}</div>
        <div class="step-agent">${s.agent_id || ''}</div>
        <div class="step-status"><span class="badge badge-${st}">${st}</span></div>
        ${st === 'failed' ? `<button onclick="event.stopPropagation();retryStep('${run.id}','${s.id}')" style="font-size:10px;padding:2px 8px;border:1px solid var(--accent-orange);color:var(--accent-orange);background:transparent;border-radius:4px;cursor:pointer">↺ Retry</button>` : ''}
        ${hasOutput ? '<span class="step-chevron" style="color:var(--text-secondary);font-size:10px;transition:transform .15s;display:inline-block">▶</span>' : ''}
      </div>
      ${hasOutput ? `<div class="step-details" style="display:none;padding:0 12px 12px 44px;font-size:12px;color:var(--text-tertiary);line-height:1.6">
        <details style="margin-top:4px" onclick="event.stopPropagation()"><summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500">Output</summary><pre style="margin-top:6px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto">${esc(s.output)}</pre></details>
      </div>` : ''}
    </div>`;
  }
  const steps = run.steps || [];
  const parts = [];
  let currentGroupIdx = null;
  steps.forEach((s, i) => {
    const gIdx = stepToGroupIdx.has(s.id) ? stepToGroupIdx.get(s.id) : null;
    // Detect group change
    if (gIdx !== currentGroupIdx) {
      // Close previous group if open
      if (currentGroupIdx !== null) {
        parts.push('</div></div>');
      }
      currentGroupIdx = gIdx;
      // Open new group if entering a loop group
      if (gIdx !== null) {
        parts.push(`<div class="loop-group"><div class="loop-group-label">Repeating loop</div><div class="loop-group-steps">`);
      }
    }
    // Inject badge before verify step (between implement and verify rows)
    if (verifyStepIds.has(s.id)) {
      parts.push(renderLoopBadge(stories));
    }
    parts.push(renderStepRow(s));
  });
  // Close any open group
  if (currentGroupIdx !== null) {
    parts.push('</div></div>');
  }
  const stepsHTML = parts.join('');
  panel.innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <h2>${run.workflow_id}</h2>
    <div class="panel-task">${esc(run.task)}</div>
    <div class="panel-meta">
      <span><span class="badge badge-${run.status}">${run.status}</span></span>
      <span>Created: ${created}</span>
      <span>Updated: ${updated}</span>
    </div>
    <div class="steps-list">${stepsHTML}</div>
      <div id="stories-panel"></div>
    <div id="activity-panel"></div>
  `;
}

function formatEventDesc(evt) {
  const e = evt.event;
  const story = evt.storyTitle ? `${evt.storyId}: "${evt.storyTitle}"` : evt.storyId || '';
  switch (e) {
    case 'run.started': return 'Run started';
    case 'run.completed': return 'Run completed ✅';
    case 'run.failed': return 'Run failed ❌';
    case 'step.pending': return `Step pending`;
    case 'step.running': return `Claimed step`;
    case 'step.done': return `Step completed`;
    case 'step.failed': return `Step failed` + (evt.detail ? `: ${evt.detail.slice(0,80)}` : '');
    case 'step.timeout': return `Step timed out` + (evt.detail ? ` — ${evt.detail}` : '');
    case 'story.started': return `Claimed story ${story}`;
    case 'story.done': return `Completed ${story}`;
    case 'story.verified': return `Verified ${story} ✅`;
    case 'story.retry': return `Retry ${story}` + (evt.detail ? ` — ${evt.detail.slice(0,80)}` : '');
    case 'story.failed': return `Story failed ${story}`;
    case 'pipeline.advanced': return `Pipeline advanced`;
    default: return e;
  }
}

async function loadActivity(runId) {
  const events = await fetchJSON(`/api/runs/${runId}/events`);
  const panel = document.getElementById('activity-panel');
  if (!events || events.length === 0) { panel.innerHTML = ''; return; }
  const rows = events.map(evt => {
    const t = parseTS(evt.ts);
    const time = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const agent = evt.agentId ? evt.agentId.split('/').pop() : '';
    const desc = formatEventDesc(evt);
    const agentSpan = agent
      ? `<span style="color:var(--accent-teal);font-family:'Geist Mono',monospace;flex-shrink:0">${esc(agent)}</span>`
      : '';
    return `<div style="display:flex;gap:12px;padding:4px 0;font-size:12px;line-height:1.5;border-bottom:1px solid var(--border-light)">
      <span style="color:var(--text-secondary);font-family:'Geist Mono',monospace;flex-shrink:0;min-width:44px">${time}</span>
      ${agentSpan}
      <span style="color:var(--text-primary)">${esc(desc)}</span>
    </div>`;
  }).join('');
  panel.innerHTML = `
    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <h3 style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:12px">Activity</h3>
      <div style="max-height:300px;overflow-y:auto">${rows}</div>
    </div>
  `;
}

function closePanel() {
  clearOpenRunRefresh();
  openRunId = null;
  document.getElementById('overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadStories(runId) {
  const stories = await fetchJSON(`/api/runs/${runId}/stories`);
  window._lastStories = stories || [];
  const panel = document.getElementById('stories-panel');
  if (!stories || stories.length === 0) { panel.innerHTML = ''; return; }
  const done = stories.filter(s => s.status === 'done').length;
  const pct = Math.round((done / stories.length) * 100);
  panel.innerHTML = `
    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:600;color:var(--text-primary)">Stories</h3>
        <span style="font-size:13px;font-weight:600;color:var(--accent-green)">${done} / ${stories.length} done</span>
      </div>
      <div style="background:var(--accent-muted);border-radius:4px;height:8px;margin-bottom:16px;overflow:hidden">
        <div style="background:var(--accent-green);height:100%;width:${pct}%;border-radius:4px;transition:width .3s"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${stories.map((s, i) => {
          const st = s.status || 'pending';
          const icon = stepIcons[st] || '○';
          let ac = [];
          try { ac = JSON.parse(s.acceptance_criteria || '[]'); } catch { ac = [s.acceptance_criteria]; }
          const retryInfo = s.retry_count > 0 ? ` <span style="color:var(--accent-orange);font-size:10px">(retry ${s.retry_count})</span>` : '';
          const hasDetails = s.description || ac.length > 0 || s.output;
          const toggleAttr = hasDetails ? `onclick="this.querySelector('.story-details').classList.toggle('story-open');this.querySelector('.story-chevron').classList.toggle('story-chevron-open')" style="cursor:pointer"` : '';
          return `<div class="step-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden" ${toggleAttr}>
            <div style="display:flex;align-items:center;gap:8px;padding:10px 12px">
              <div class="step-icon ${st}">${icon}</div>
              <div class="step-name" style="flex:1">${s.story_id}: ${s.title}${retryInfo}</div>
              <div class="step-status"><span class="badge badge-${st}">${st}</span></div>
              ${st === 'failed' ? `<button onclick="event.stopPropagation();retryStory('${openRunId}','${s.id}')" style="font-size:10px;padding:2px 8px;border:1px solid var(--accent-orange);color:var(--accent-orange);background:transparent;border-radius:4px;cursor:pointer">↺ Retry</button>` : ''}
              ${hasDetails ? '<span class="story-chevron" style="color:var(--text-secondary);font-size:10px;transition:transform .15s;display:inline-block">▶</span>' : ''}
            </div>
            ${hasDetails ? `<div class="story-details" style="display:none;padding:0 12px 12px 44px;font-size:12px;color:var(--text-tertiary);line-height:1.6">
              ${s.description ? `<div style="margin-bottom:8px">${esc(s.description)}</div>` : ''}
              ${ac.length > 0 ? `<div style="margin-bottom:8px"><div style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--accent-green);margin-bottom:4px">Acceptance Criteria</div>${ac.map(c => `<label style="display:flex;align-items:flex-start;gap:6px;margin-bottom:3px;cursor:default"><span style="color:var(${st==='done'?'--accent-green':'--border'});flex-shrink:0">${st==='done'?'☑':'☐'}</span><span>${esc(c)}</span></label>`).join('')}</div>` : ''}
              ${s.output ? `<details style="margin-top:4px" onclick="event.stopPropagation()"><summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500">Output</summary><pre style="margin-top:6px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto">${esc(s.output)}</pre></details>` : ''}
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

document.getElementById('wf-select').addEventListener('change', e => selectWorkflow(e.target.value));
initStatusFilterButtons();
loadWorkflows();
loadProjects().then(() => {
  if (!currentWf) document.getElementById('board').innerHTML = renderProjectsColumn() + '<div class="empty" style="margin:auto">Select a workflow</div>';
});
setInterval(() => {
  if (currentWf) loadRuns();
  else {
    Promise.all([loadBacklog(), loadProjects()]).then(() => {

// ── Medic ───────────────────────────────────────────────────────
let medicPanelOpen = false;

function toggleMedicPanel() {
  medicPanelOpen = !medicPanelOpen;
  document.getElementById('medic-panel').classList.toggle('open', medicPanelOpen);
  if (medicPanelOpen) loadMedicData();
}

document.addEventListener('click', e => {
  if (!medicPanelOpen) return;
  const panel = document.getElementById('medic-panel');
  const badge = document.getElementById('medic-badge');
  if (!panel.contains(e.target) && !badge.contains(e.target)) {
    medicPanelOpen = false;
    panel.classList.remove('open');
  }
});

async function loadMedicStatus() {
  try {
    const status = await fetchJSON('/api/medic/status');
    const dot = document.getElementById('medic-dot');
    const label = document.getElementById('medic-label');

    if (!status.installed || !status.lastCheck) {
      dot.className = 'medic-dot unknown';
      label.textContent = 'Medic';
      return;
    }

    const ageMin = Math.round((Date.now() - parseTS(status.lastCheck.checkedAt).getTime()) / 60000);
    const hasIssues = status.lastCheck.issuesFound > 0;
    const isStale = ageMin > 10;

    if (hasIssues && status.lastCheck.actionsTaken < status.lastCheck.issuesFound) {
      dot.className = 'medic-dot critical';
      label.textContent = `${status.lastCheck.issuesFound} issue(s)`;
    } else if (isStale) {
      dot.className = 'medic-dot warning';
      label.textContent = `${ageMin}m ago`;
    } else if (hasIssues) {
      dot.className = 'medic-dot warning';
      label.textContent = `${status.lastCheck.issuesFound} fixed`;
    } else {
      dot.className = 'medic-dot healthy';
      label.textContent = `${ageMin}m ago`;
    }
  } catch {
    document.getElementById('medic-dot').className = 'medic-dot unknown';
    document.getElementById('medic-label').textContent = 'Medic';
  }
}

async function loadMedicData() {
  const body = document.getElementById('medic-panel-body');
  try {
    const [status, checks] = await Promise.all([
      fetchJSON('/api/medic/status'),
      fetchJSON('/api/medic/checks?limit=10'),
    ]);

    let html = '';
    html += '<div style="margin-bottom:12px">';
    if (status.lastCheck) {
      const ageMin = Math.round((Date.now() - parseTS(status.lastCheck.checkedAt).getTime()) / 60000);
      html += `<div class="medic-stat"><span>Last check</span><span class="medic-stat-value">${ageMin}m ago</span></div>`;
      html += `<div class="medic-stat"><span>Result</span><span class="medic-stat-value">${esc(status.lastCheck.summary)}</span></div>`;
    } else {
      html += '<div class="medic-stat"><span>Last check</span><span class="medic-stat-value">Never</span></div>';
    }
    html += `<div class="medic-stat"><span>Checks (24h)</span><span class="medic-stat-value">${status.recentChecks}</span></div>`;
    html += `<div class="medic-stat"><span>Issues found (24h)</span><span class="medic-stat-value">${status.recentIssues}</span></div>`;
    html += `<div class="medic-stat"><span>Auto-fixed (24h)</span><span class="medic-stat-value">${status.recentActions}</span></div>`;
    html += '</div>';

    if (checks.length > 0) {
      html += '<div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Recent Checks</div>';
      for (const c of checks) {
        const t = parseTS(c.checkedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        const icon = c.issuesFound === 0 ? '·' : c.actionsTaken > 0 ? '~' : '!';
        const color = c.issuesFound === 0 ? 'var(--text-secondary)' : c.actionsTaken >= c.issuesFound ? 'var(--accent-teal)' : 'var(--accent-orange)';
        html += `<div class="medic-check-row">
          <span class="medic-check-time">${t}</span>
          <span class="medic-check-summary" style="color:${color}">${icon} ${esc(c.summary)}</span>
        </div>`;
      }
    }

    body.innerHTML = html || '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">No medic data yet. Run <code>antfarm medic install</code> to enable.</div>';
  } catch {
    body.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">Could not load medic data.</div>';
  }
}

loadMedicStatus();
setInterval(loadMedicStatus, 30000);

// ── Theme toggle ──────────────────────────────────────────────────
(function initTheme() {
  const btn = document.getElementById('theme-toggle');
  const root = document.documentElement;
  const STORAGE_KEY = 'antfarm-theme';

  function getEffectiveTheme() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    btn.textContent = theme === 'dark' ? '🌙' : '☀️';
    btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }

  applyTheme(getEffectiveTheme());

  btn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') || getEffectiveTheme();
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem(STORAGE_KEY, next);
    applyTheme(next);
  });

  // Update if system preference changes and no manual override
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (!localStorage.getItem(STORAGE_KEY)) applyTheme(getEffectiveTheme());
  });
})();
</script>
